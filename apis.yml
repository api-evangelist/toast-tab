- aid: toast-tab:toast-authentication-api
  name: Toast Authentication API
  description: OAuth 2.0 client-credentials authentication for Toast APIs. Exchanges
    a clientId and clientSecret (with userAccessType TOAST_MACHINE_CLIENT) for a bearer
    access token at /authentication/v1/authentication/login. Token lifetime is returned
    in the response and varies by environment.
  humanURL: https://doc.toasttab.com/openapi/authentication/overview/
  baseURL: https://ws-api.toasttab.com/authentication/v1
