aid: toast-tab
name: Toast
description: 'Toast (NYSE: TOST) is a cloud-based restaurant technology platform that
  unifies point-of-sale (POS), payments, online ordering, delivery, digital marketing,
  loyalty, gift cards, kitchen display, inventory, and team management for restaurants
  of every size — from independent operators to enterprise chains. The Toast platform
  exposes a substantial REST API surface at https://ws-api.toasttab.com/, authenticated
  via OAuth 2.0 client credentials, and is used by restaurants, internal IT teams,
  and the Toast Partner Integrations program to read and write menus, orders, payments,
  employees, schedules, time entries, cash entries, kitchen tickets, restaurant configuration,
  gift cards, loyalty balances, and partner-restaurant connections. Toast offers three
  flavors of API access: Standard API Access (self-service for restaurant operators),
  Analytics API Access (Restaurant Management Suites Pro), and Partner Integrations
  (technology companies building productized integrations).'
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Restaurants
- Point Of Sale
- Payments
- Online Ordering
- Delivery
- Loyalty
- Gift Cards
- Menus
- Orders
- Kitchen
- Labor
- Scheduling
- Inventory
- Hospitality
- Partner Integrations
url: https://raw.githubusercontent.com/api-evangelist/toast-tab/refs/heads/main/apis.yml
created: '2026-05-25'
modified: '2026-06-03'
