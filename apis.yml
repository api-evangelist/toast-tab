- type: Features
  data:
  - name: OAuth 2.0 Client Credentials
    description: Machine-to-machine authentication issuing bearer tokens for all Toast
      platform APIs.
  - name: Orders & Payments
    description: Create, retrieve, modify, and void orders, checks, selections, payments,
      and refunds.
  - name: Menus
    description: Read published menu, menu group, item, modifier, and pricing data
      in V2 and V3 shapes.
  - name: Labor Management
    description: Manage employees, jobs, shifts, and time entries for scheduling and
      payroll vendors.
  - name: Stock / 86ing
    description: Read and update menu-item stock levels to keep ordering channels
      in sync.
  - name: Partner Integrations
    description: Discover accessible and connected restaurants across the Toast network
      for a partner client.
- type: UseCases
  data:
  - name: Online Ordering Integration
    description: Post orders and read menus/stock to power third-party ordering and
      delivery channels.
  - name: Payroll & Scheduling
    description: Sync employees, jobs, shifts, and time entries into payroll, HR,
      and scheduling platforms.
  - name: BI & Reporting
    description: Pull analytics and operational data into warehouses and BI tooling.
  - name: Gift Card & Loyalty Programs
    description: Integrate third-party gift card, loyalty, and alternative tender
      programs via callback specs.
- type: Integrations
  data:
  - name: Delivery Marketplaces
    description: Route demand and availability to delivery and online-ordering partners.
  - name: Payroll Providers
    description: Labor API time entries feed payroll and workforce-management systems.
  - name: Loyalty & Gift Card Vendors
    description: Inline callbacks let third-party loyalty/gift-card programs participate
      in checks.
