  closedDate: DateTime
}

type Refund {
  refundAmount: Float
  tipRefundAmount: Float
  status: RefundStatus
  refundTransaction: RefundTransaction
}

type RefundTransaction {
  guid: UUID!
  entityType: String
  externalId: String
  amount: Float
  originalPayment: ToastReference
}

type VoidInformation {
  voidUser: ToastReference
  voidDate: DateTime
  voidBusinessDate: Int
