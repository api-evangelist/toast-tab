  deliveryServiceInfo: DeliveryServiceInfo
}

type DeliveryServiceInfo {
  deliveryServiceGuid: UUID
  dispatchedDate: DateTime
  deliveryEmployee: ToastReference
  originalQuotedDeliveryDate: DateTime
}

type CurbsidePickupInfo {
  transportColor: String
  transportDescription: String
