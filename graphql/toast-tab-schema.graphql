input AnalyticsFilter {
  restaurantGuid: UUID!
  startBusinessDate: Int!
  endBusinessDate: Int!
}

input InventorySearchInput {
  restaurantGuid: UUID!
  itemGuids: [UUID]
  status: StockStatus
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────
type Query {
  # Restaurant queries
  restaurant(guid: UUID!): Restaurant
  restaurants(managementGroupGuid: UUID): [Restaurant]
  restaurantLocation(guid: UUID!, restaurantGuid: UUID!): RestaurantLocation
  restaurantLocations(restaurantGuid: UUID!): [RestaurantLocation]

  # Menu queries
  menus(filter: MenusFilter!): [Menu]
  menu(guid: UUID!, restaurantGuid: UUID!): Menu
  menuGroup(guid: UUID!, restaurantGuid: UUID!): MenuGroup
  menuItem(guid: UUID!, restaurantGuid: UUID!): MenuItem
  modifierGroup(guid: UUID!, restaurantGuid: UUID!): ModifierGroup

  # Order queries
  orders(filter: OrdersFilter!): [Order]
  order(guid: UUID!, restaurantGuid: UUID!): Order
  check(guid: UUID!, restaurantGuid: UUID!): Check

  # Discount queries
  discounts(filter: DiscountsFilter!): [Discount]
  discount(guid: UUID!, restaurantGuid: UUID!): Discount

  # Labor queries
  employees(restaurantGuid: UUID!, status: EmployeeStatus): [Employee]
  employee(guid: UUID!, restaurantGuid: UUID!): Employee
  jobs(restaurantGuid: UUID!): [Job]
  job(guid: UUID!, restaurantGuid: UUID!): Job
  timeEntries(filter: LaborFilter!): [TimeEntry]
  timeEntry(guid: UUID!, restaurantGuid: UUID!): TimeEntry
  shifts(restaurantGuid: UUID!, startDate: DateTime, endDate: DateTime): [Shift]

  # Stock queries
  inventory(input: InventorySearchInput!): [MenuItemInventory]
  menuItemInventory(guid: UUID!, restaurantGuid: UUID!): MenuItemInventory

  # Kitchen queries
  kitchenTickets(restaurantGuid: UUID!, startDate: DateTime, endDate: DateTime): [KitchenTicket]
  kitchenTicket(guid: UUID!, restaurantGuid: UUID!): KitchenTicket

  # Cash management queries
  cashEntries(restaurantGuid: UUID!, startDate: DateTime, endDate: DateTime): [CashEntry]
  cashEntry(guid: UUID!, restaurantGuid: UUID!): CashEntry

  # Configuration queries
  diningOptions(restaurantGuid: UUID!): [DiningOption]
  serviceCharges(restaurantGuid: UUID!): [ServiceCharge]
  salesCategories(restaurantGuid: UUID!): [SalesCategory]
  serviceAreas(restaurantGuid: UUID!): [ServiceArea]
  revenueCenters(restaurantGuid: UUID!): [RevenueCenter]
  packagingConfigurations(restaurantGuid: UUID!): [Packaging]

  # Partner queries
  accessibleRestaurants(pageToken: String, pageSize: Int): PaginatedPartnerAccess
  connectedRestaurants(pageToken: String, pageSize: Int): PaginatedPartnerAccess

  # Analytics queries
  salesSummary(filter: AnalyticsFilter!): [SalesSummary]
  laborSummary(filter: AnalyticsFilter!): [LaborSummary]

  # Gift card queries
  giftCard(cardNumber: String!, restaurantGuid: UUID!): GiftCard

  # Loyalty queries
  loyaltyAccount(identifier: String!, restaurantGuid: UUID!): LoyaltyAccount
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────
type Mutation {
  # Order mutations
  createOrder(input: CreateOrderInput!): Order
  voidOrder(guid: UUID!, restaurantGuid: UUID!, reason: String): Order
  addCheckToOrder(orderGuid: UUID!, restaurantGuid: UUID!, check: CreateCheckInput!): Order
  addSelectionToCheck(checkGuid: UUID!, restaurantGuid: UUID!, selection: CreateSelectionInput!): Check
  voidSelection(selectionGuid: UUID!, restaurantGuid: UUID!, voidReasonGuid: UUID): Selection
  applyDiscountToCheck(checkGuid: UUID!, restaurantGuid: UUID!, discountGuid: UUID!, promoCode: String): Check
  removeDiscountFromCheck(checkGuid: UUID!, restaurantGuid: UUID!, appliedDiscountGuid: UUID!): Check

  # Employee mutations
  createEmployee(restaurantGuid: UUID!, input: EmployeeInput!): Employee
  updateEmployee(guid: UUID!, restaurantGuid: UUID!, input: EmployeeInput!): Employee
  deleteEmployee(guid: UUID!, restaurantGuid: UUID!): Boolean

  # Time entry mutations
  createTimeEntry(restaurantGuid: UUID!, input: TimeEntryInput!): TimeEntry
  updateTimeEntry(guid: UUID!, restaurantGuid: UUID!, input: TimeEntryInput!): TimeEntry
  deleteTimeEntry(guid: UUID!, restaurantGuid: UUID!): Boolean

  # Stock mutations
  updateStock(input: StockUpdateInput!): MenuItemInventory
  bulkUpdateStock(restaurantGuid: UUID!, updates: [StockUpdateInput!]!): [MenuItemInventory]

  # Cash management mutations
  createCashEntry(input: CashEntryInput!): CashEntry

  # Gift card mutations
  activateGiftCard(cardNumber: String!, restaurantGuid: UUID!, amount: Float!): GiftCardTransaction
  reloadGiftCard(cardNumber: String!, restaurantGuid: UUID!, amount: Float!): GiftCardTransaction
  redeemGiftCard(cardNumber: String!, restaurantGuid: UUID!, amount: Float!): GiftCardTransaction
  voidGiftCardTransaction(transactionGuid: UUID!, restaurantGuid: UUID!): GiftCardTransaction

  # Loyalty mutations
  accruePoints(identifier: String!, restaurantGuid: UUID!, amount: Float!): LoyaltyTransaction
  redeemPoints(identifier: String!, restaurantGuid: UUID!, points: Float!): LoyaltyTransaction
}
