}

type Selection {
  guid: UUID!
  entityType: String
  externalId: String
  displayName: String
  quantity: Float
  price: Float
  tax: Float
  unitOfMeasure: String
  selectionType: SelectionType
  item: ToastReference
  salesCategory: ToastReference
  appliedDiscounts: [AppliedDiscount]
  appliedTaxes: [AppliedTaxRate]
  modifiers: [Selection]
  voidReason: ToastReference
  voided: Boolean
  voidDate: DateTime
  fulfillmentStatus: String
  deferredDate: DateTime
}

type Payment {
  guid: UUID!
  entityType: String
  externalId: String
