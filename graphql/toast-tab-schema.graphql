}

type Shift {
  guid: UUID!
  employee: ToastReference!
  job: ToastReference!
  startDate: DateTime!
  endDate: DateTime
  status: ShiftStatus
  publishedShift: Boolean
  isPosted: Boolean
  inDate: DateTime
  outDate: DateTime
  timeEntries: [TimeEntry]
  breaks: [TimeEntryBreak]
  wage: Float
  wageFrequency: String
}

type ScheduleConfig {
  enabled: Boolean
  weekStart: String
  overtimeThreshold: Float
}

# ─────────────────────────────────────────────
