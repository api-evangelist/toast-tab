}

type Customer {
  guid: UUID
  firstName: String
  lastName: String
  phone: String
  email: String
  loyaltyIdentifier: String
}

type DeliveryInfo {
  address: Address
  deliveredDate: DateTime
  dispatchedDate: DateTime
