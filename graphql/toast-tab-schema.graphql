}

type SalesCategory {
  guid: UUID!
  name: String!
}

type ItemTag {
  guid: UUID!
  name: String!
}

type PricingRules {
  guid: UUID!
  name: String!
  rules: [SequencePrice]
}

type SequencePrice {
  sequence: Int!
  price: Float!
}

# ─────────────────────────────────────────────
# Order Types
# ─────────────────────────────────────────────
type Order {
  guid: UUID!
  entityType: String
  externalId: String
  displayNumber: String
  status: OrderStatus
  openedDate: DateTime
  closedDate: DateTime
  modifiedDate: DateTime
  deletedDate: DateTime
  deliveryInfo: DeliveryInfo
  diningOption: ToastReference
  serviceArea: ToastReference
  table: ToastReference
  server: ToastReference
  device: Device
  guestCount: Int
  numberOfGuests: Int
  estimatedFulfillmentDate: DateTime
  createdDevice: Device
  lastModifiedDevice: Device
  checks: [Check]
  curbsidePickupInfo: CurbsidePickupInfo
  source: String
  voided: Boolean
  voidDate: DateTime
  voidBusinessDate: Int
}

type Check {
  guid: UUID!
  entityType: String
  externalId: String
  displayNumber: String
  openedDate: DateTime
  closedDate: DateTime
  modifiedDate: DateTime
  tabName: String
  totalAmount: Float
  subtotalAmount: Float
  taxAmount: Float
  totalDiscountAmount: Float
  customer: Customer
  selections: [Selection]
  appliedDiscounts: [AppliedDiscount]
  appliedServiceCharges: [AppliedServiceCharge]
  appliedLoyaltyInfo: AppliedLoyaltyInfo
  payments: [Payment]
