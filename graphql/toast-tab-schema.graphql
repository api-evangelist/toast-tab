# Toast GraphQL Schema
# Conceptual schema derived from the Toast REST API covering orders, menus,
# discounts, labor, payments, and restaurant configuration.

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────
scalar DateTime
scalar UUID
scalar Money

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────
enum OrderStatus {
  OPEN
  NEEDS_APPROVAL
  VOIDED
  CLOSED
}

enum PaymentStatus {
  OPEN
  CLOSED
  VOIDED
  CAPTURED
  AUTHORIZED
}

enum PaymentType {
  CREDIT_CARD
  CASH
  GIFT_CARD
  HOUSE_ACCOUNT
  TENDER_TYPE
  OTHER
}

enum DiningOptionBehavior {
  DINE_IN
  TAKE_OUT
  DELIVERY
  DRIVE_THRU
  ONLINE_ORDER
}

enum SelectionType {
  MENU_ITEM
  OPEN_ITEM
  MODIFIER
  GIFT_CARD
  SPECIAL_REQUEST
}

enum VoidReason {
  CUSTOMER_MISTAKE
  STAFF_MISTAKE
  SPILLED
  OTHER
  WRONG_ORDER
}

enum DiscountType {
  PERCENT
  FIXED
  OPEN_PERCENT
  OPEN_AMOUNT
  BOGO
}

enum EmployeeStatus {
  ACTIVE
  INACTIVE
  DELETED
}

enum ShiftStatus {
  OPEN
  CLOSED
  ACTIVE
}

enum TimeEntryStatus {
  RECORDED
  APPROVED
  VOIDED
}

enum MenuItemVisibility {
  ALL
  POS
  ONLINE
  KIOSK
  THIRD_PARTY
  NONE
}

enum StockStatus {
  IN_STOCK
  OUT_OF_STOCK
  QUANTITY_LIMITED
}

enum RefundStatus {
  REFUND_SUCCESSFUL
  REFUND_FAILED
  REFUND_DECLINED
  REFUND_PARTIAL
}

enum KitchenTicketStatus {
  NEW
  IN_PROGRESS
  DONE
  VOIDED
}

enum PackagingInstructionType {
  STANDARD
  CURBSIDE
  DELIVERY
}

enum ServiceChargeCalculation {
  CHECK
  PERCENTAGE
  PER_ITEM
  PER_PERSON
}

enum CashEntryType {
  PAID_IN
  PAID_OUT
  DRAWER_COUNT
  DEPOSIT
}

enum LoyaltyActionType {
  ACCRUE
  REDEEM
  LOOKUP
  VOID
}

enum GiftCardActionType {
  ACTIVATE
  RELOAD
  REDEEM
  BALANCE_INQUIRY
  VOID
}

enum AllergenType {
  MILK
  EGGS
  FISH
  SHELLFISH
  TREE_NUTS
  PEANUTS
  WHEAT
  SOYBEANS
  SESAME
}

enum AlcoholType {
  BEER
  WINE
  SPIRITS
  NONE
}

# ─────────────────────────────────────────────
# Common / Shared Types
# ─────────────────────────────────────────────
type ToastReference {
  guid: UUID!
  entityType: String
  externalId: String
}

type ExternalReference {
  externalId: String!
  externalSource: String
}

type Address {
  street1: String
  street2: String
  city: String
  state: String
  zipCode: String
  country: String
  latitude: Float
  longitude: Float
}

type Image {
  url: String!
  altText: String
  width: Int
  height: Int
}

type TimeRange {
  start: String!
  end: String!
}

type Money {
  amount: Float!
  currencyCode: String!
}

type TaxRate {
  guid: UUID!
  name: String
  rate: Float
  taxable: Boolean
}

# ─────────────────────────────────────────────
# Restaurant & Configuration Types
# ─────────────────────────────────────────────
type Restaurant {
  guid: UUID!
  name: String!
  description: String
  address: Address
  phone: String
  timezone: String
  currencyCode: String
  location: RestaurantLocation
  urls: RestaurantUrls
  hours: RestaurantHours
  general: RestaurantGeneral
  onlineOrdering: OnlineOrdering
  delivery: DeliveryConfig
  prepTimes: PrepTimes
  paymentOptions: PaymentOptions
  images: [Image]
  schedules: [Schedule]
  serviceAreas: [ServiceArea]
  revenueCenters: [RevenueCenter]
  menus: [Menu]
  employees: [Employee]
  jobs: [Job]
}

type RestaurantLocation {
  guid: UUID!
  restaurantGuid: UUID!
  externalId: String
  description: String
  address: Address
}

type RestaurantUrls {
  website: String
  orderingUrl: String
  purchaseGiftCardUrl: String
  checkGiftCardBalanceUrl: String
  loyaltySignUpUrl: String
}

type RestaurantHours {
  Sunday: [TimeRange]
  Monday: [TimeRange]
  Tuesday: [TimeRange]
  Wednesday: [TimeRange]
  Thursday: [TimeRange]
  Friday: [TimeRange]
  Saturday: [TimeRange]
}

type RestaurantGeneral {
  name: String
  locationName: String
  phone: String
  timezone: String
  closeoutHour: Int
  managementGroupGuid: UUID
}

type OnlineOrdering {
  acceptsOnlineOrders: Boolean
  estimatedFulfillmentDate: DateTime
  logo: Image
  socialMediaLinks: [SocialMediaLink]
}

type SocialMediaLink {
  platform: String
  url: String
}

type DeliveryConfig {
  enabled: Boolean
  minimumOrderAmount: Float
  leadTime: Int
  deliveryRadius: Float
  deliveryFee: Float
}

type PrepTimes {
  prepTime: Int
  deliveryPrepTime: Int
}

type PaymentOptions {
  allowCash: Boolean
  allowCreditCards: Boolean
  allowGiftCards: Boolean
  allowHouseAccounts: Boolean
  allowTabs: Boolean
}

type Schedule {
  guid: UUID!
  name: String!
  timeRanges: [TimeRange]
  days: [String]
}

type ServiceArea {
  guid: UUID!
  name: String!
  description: String
  tables: [Table]
}

type Table {
  guid: UUID!
  name: String!
  seats: Int
  serviceAreaGuid: UUID
}

type RevenueCenter {
  guid: UUID!
  name: String!
  description: String
}

# ─────────────────────────────────────────────
# Menu Types
# ─────────────────────────────────────────────
type Menu {
  guid: UUID!
  name: String!
  description: String
  visibility: MenuItemVisibility
  availability: Availability
  images: [Image]
  menuGroups: [MenuGroup]
}

type MenuGroup {
  guid: UUID!
  name: String!
  description: String
  visibility: MenuItemVisibility
  menuItems: [MenuItem]
  modifierGroups: [ModifierGroup]
}

type MenuItem {
  guid: UUID!
  name: String!
  description: String
  price: Float
  sku: String
  calories: Int
  unitOfMeasure: String
  visibility: MenuItemVisibility
  availability: Availability
  images: [Image]
  modifierGroups: [ModifierGroup]
