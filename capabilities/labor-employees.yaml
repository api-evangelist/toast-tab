    description: Toast Labor API — Employees business capability. Self-contained, no shared references.
    resources:
    - name: employees
      path: /employees
      operations:
      - name: employeesGet
        method: GET
        description: Toast Get Employees
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: employeeIds
          in: query
          type: string
          required: false
          description: "An optional identifier that filters return values for a \nspecific employee. The identifier can be a Toast platform \nGUID or an external identifier. If present, the `employees` \nresource will only retu"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: employees
      path: /employees
      operations:
      - name: employeesPost
        method: POST
        description: Toast Add an Employee
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: Content-Type
          in: header
          type: string
          required: true
          description: "The Internet Assigned Numbers Authority (IANA) media type \nof the message body data. The value must be \n`application/json`."
        - name: body
          in: body
          type: object
          required: true
          description: "An `Employee` object containing information about the \nemployee, including the employee's name and email address."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
