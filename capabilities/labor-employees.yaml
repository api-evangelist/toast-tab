          in: header
          type: string
          required: true
          description: "The Internet Assigned Numbers Authority (IANA) media type \nof the message body data. The value must be \n`application/json`."
        - name: body
          in: body
          type: object
          required: true
          description: "The JSON string value of the `externalId` for the employee \nrecord. Wrap the value in double quotation marks to make it \nvalid JSON syntax."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
