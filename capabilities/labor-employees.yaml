        - name: Content-Type
          in: header
          type: string
          required: true
          description: "The Internet Assigned Numbers Authority (IANA) media type \nof the message body data. The value must be \n`application/json`."
        - name: body
          in: body
          type: object
          required: true
          description: An array of JSON `JobWageOverride` objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
