        - name: body
          in: body
          type: object
          required: true
          description: "The JSON string value of the `externalId` for the employee \nrecord. Wrap the value in double quotation marks to make it \nvalid JSON syntax."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
