          description: "The Toast platform GUID or external identifier for the \nemployee to be returned."
        - name: body
          in: body
          type: object
          required: true
          description: "A JSON object containing the employee information that you \nare updating. You can update an employee's:\n\n* `firstName` - First name.\n\n* `chosenName` - Chosen name.\n\n* `lastName` - Last name.\n\n* `exter"
        outputRawFormat: json
        outputParameters:
