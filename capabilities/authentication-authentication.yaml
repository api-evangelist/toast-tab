naftiko: 1.0.0-alpha2
info:
  label: Toast authentication API — Authentication
  description: 'Toast authentication API — Authentication. 1 operations. Lead operation: Toast Get an Authentication Token. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Toast authentication
  - Authentication
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: authentication-authentication
    baseUri: https://ws-api.toasttab.com/authentication/v1
    description: Toast authentication API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: authenticationlogin
      path: /authentication/login
      operations:
      - name: authenticationLoginPost
        method: POST
        description: Toast Get an Authentication Token
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: "The authentication credentials for your Toast API client integration\nsoftware."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: authentication-authentication-rest
    port: 8080
    description: REST adapter for Toast authentication API — Authentication. One resource per consumed operation.
    resources:
    - path: /v1/authenticationlogin
      name: authenticationlogin
      description: REST surface for authenticationLoginPost.
      operations:
      - method: POST
        name: authenticationLoginPost
        description: Toast Get an Authentication Token
        call: authentication-authentication.authenticationLoginPost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authentication-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toast authentication API — Authentication. One tool per consumed operation.
    tools:
    - name: get-authentication-token
      description: Toast Get an Authentication Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: authentication-authentication.authenticationLoginPost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
