naftiko: 1.0.0-alpha2
info:
  label: Restaurants API — general
  description: 'Restaurants API — general. 2 operations. Lead operation: Toast Get Restaurant Configuration Information. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Restaurants
  - general
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: restaurants-general
    baseUri: https://ws-api.toasttab.com/restaurants/v1
    description: Restaurants API — general business capability. Self-contained, no shared references.
    resources:
    - name: restaurantsrestaurant-guid
      path: /restaurants/{restaurantGUID}
      operations:
      - name: restaurantsRestaurantGuidGet
        method: GET
        description: Toast Get Restaurant Configuration Information
        inputParameters:
        - name: restaurantGUID
          in: path
          type: string
          required: true
          description: "The Toast GUID of the restaurant that you want to get \ninformation about."
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast GUID of the restaurant that you want to get \ninformation about."
        - name: includeArchived
          in: query
          type: boolean
          required: false
          description: "Set `includeArchived` to `true` if the API should return information\nabout the restaurant even if it is archived. The `General` object in\nthe response includes an `archived` value that your integratio"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groupsmanagement-group-guidrestaurants
      path: /groups/{managementGroupGUID}/restaurants
      operations:
      - name: groupsManagementGroupGuidRestaurantsGet
        method: GET
        description: Toast Get Restaurants in a Management Group
        inputParameters:
        - name: managementGroupGUID
          in: path
          type: string
          required: true
          description: The GUID of the restaurant management group.
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast GUID of one restaurant location in the management \ngroup."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: restaurants-general-rest
    port: 8080
    description: REST adapter for Restaurants API — general. One resource per consumed operation.
    resources:
    - path: /v1/restaurantsrestaurant-guid
      name: restaurantsrestaurant-guid
      description: REST surface for restaurantsRestaurantGuidGet.
      operations:
      - method: GET
        name: restaurantsRestaurantGuidGet
        description: Toast Get Restaurant Configuration Information
        call: restaurants-general.restaurantsRestaurantGuidGet
        with:
          restaurantGUID: rest.restaurantGUID
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          includeArchived: rest.includeArchived
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groupsmanagement-group-guidrestaurants
      name: groupsmanagement-group-guidrestaurants
      description: REST surface for groupsManagementGroupGuidRestaurantsGet.
      operations:
      - method: GET
        name: groupsManagementGroupGuidRestaurantsGet
        description: Toast Get Restaurants in a Management Group
        call: restaurants-general.groupsManagementGroupGuidRestaurantsGet
        with:
          managementGroupGUID: rest.managementGroupGUID
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: restaurants-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Restaurants API — general. One tool per consumed operation.
    tools:
    - name: get-restaurant-configuration-information
      description: Toast Get Restaurant Configuration Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: restaurants-general.restaurantsRestaurantGuidGet
      with:
        restaurantGUID: tools.restaurantGUID
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        includeArchived: tools.includeArchived
      outputParameters:
      - type: object
        mapping: $.
    - name: get-restaurants-management-group
      description: Toast Get Restaurants in a Management Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: restaurants-general.groupsManagementGroupGuidRestaurantsGet
      with:
        managementGroupGUID: tools.managementGroupGUID
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
      outputParameters:
      - type: object
        mapping: $.
