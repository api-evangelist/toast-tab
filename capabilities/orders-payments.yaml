naftiko: 1.0.0-alpha2
info:
  label: Toast Orders API — Payments
  description: 'Toast Orders API — Payments. 4 operations. Lead operation: Toast Get Payment Identifiers. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Toast Orders
  - Payments
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: orders-payments
    baseUri: https://ws-api.toasttab.com/orders/v2
    description: Toast Orders API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: paymentsGet
        method: GET
        description: Toast Get Payment Identifiers
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The GUID of the restaurant used as the context of the request.
        - name: paidBusinessDate
          in: query
          type: string
          required: false
          description: "Returns a list of the payments that were made during\none business day.\n\nSpecify the business day in the format yyyyMMdd.\nFor example, `20170101`."
        - name: refundBusinessDate
          in: query
          type: string
          required: false
          description: "Returns a list of the payments that were refunded\nduring one business day.\n\nSpecify the business day in the format\nyyyyMMdd. For example, `20170101`."
        - name: voidBusinessDate
          in: query
          type: string
          required: false
          description: "Returns a list of the payments that were voided during\none business day.\n\nSpecify the business day in the format yyyyMMdd.\nFor example, `20170101`."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: paymentsguid
      path: /payments/{guid}
      operations:
      - name: paymentsGuidGet
        method: GET
        description: Toast Get a Payment
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The GUID of the restaurant used as the context of the request.
        - name: guid
          in: path
          type: string
          required: true
          description: The GUID for the payment you want to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ordersorder-guidcheckscheck-guidpayments
      path: /orders/{orderGuid}/checks/{checkGuid}/payments
      operations:
      - name: ordersChecksPaymentsPost
        method: POST
        description: Toast Post Payments
        inputParameters:
        - name: orderGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the order that you are\nadding payments to."
        - name: checkGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the check that you are\nadding payments to."
        - name: body
          in: body
          type: object
          required: true
          description: An array of JSON `Payment` objects containing information about the payments you are adding.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ordersorder-guidcheckscheck-guidpaymentspayment-guid
      path: /orders/{orderGuid}/checks/{checkGuid}/payments/{paymentGuid}
      operations:
      - name: ordersOrderGuidChecksCheckGuidPaymentsPaymentGuidPatch
        method: PATCH
        description: Toast Update a Tip Amount
        inputParameters:
        - name: orderGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the order that you are\nupdating a tip in."
        - name: checkGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the check that you are\nupdating a tip in."
        - name: paymentGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the payment that you are\nupdating a tip in."
        - name: body
          in: body
          type: object
          required: true
          description: "A JSON `Payment` object\ncontaining the `tipAmount` value that will replace any\nexisting tip amount for the payment.\n\nDo not include any\nvalue other than `tipAmount`."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: orders-payments-rest
    port: 8080
    description: REST adapter for Toast Orders API — Payments. One resource per consumed operation.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for paymentsGet.
      operations:
      - method: GET
        name: paymentsGet
        description: Toast Get Payment Identifiers
        call: orders-payments.paymentsGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          paidBusinessDate: rest.paidBusinessDate
          refundBusinessDate: rest.refundBusinessDate
          voidBusinessDate: rest.voidBusinessDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/paymentsguid
      name: paymentsguid
      description: REST surface for paymentsGuidGet.
      operations:
      - method: GET
        name: paymentsGuidGet
        description: Toast Get a Payment
        call: orders-payments.paymentsGuidGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          guid: rest.guid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ordersorder-guidcheckscheck-guidpayments
      name: ordersorder-guidcheckscheck-guidpayments
      description: REST surface for ordersChecksPaymentsPost.
      operations:
      - method: POST
        name: ordersChecksPaymentsPost
        description: Toast Post Payments
        call: orders-payments.ordersChecksPaymentsPost
        with:
          orderGuid: rest.orderGuid
          checkGuid: rest.checkGuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ordersorder-guidcheckscheck-guidpaymentspayment-guid
      name: ordersorder-guidcheckscheck-guidpaymentspayment-guid
      description: REST surface for ordersOrderGuidChecksCheckGuidPaymentsPaymentGuidPatch.
      operations:
      - method: PATCH
        name: ordersOrderGuidChecksCheckGuidPaymentsPaymentGuidPatch
        description: Toast Update a Tip Amount
        call: orders-payments.ordersOrderGuidChecksCheckGuidPaymentsPaymentGuidPatch
        with:
          orderGuid: rest.orderGuid
          checkGuid: rest.checkGuid
          paymentGuid: rest.paymentGuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: orders-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toast Orders API — Payments. One tool per consumed operation.
    tools:
    - name: get-payment-identifiers
      description: Toast Get Payment Identifiers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: orders-payments.paymentsGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        paidBusinessDate: tools.paidBusinessDate
        refundBusinessDate: tools.refundBusinessDate
        voidBusinessDate: tools.voidBusinessDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment
      description: Toast Get a Payment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: orders-payments.paymentsGuidGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        guid: tools.guid
      outputParameters:
      - type: object
        mapping: $.
    - name: post-payments
      description: Toast Post Payments
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: orders-payments.ordersChecksPaymentsPost
      with:
        orderGuid: tools.orderGuid
        checkGuid: tools.checkGuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-tip-amount
      description: Toast Update a Tip Amount
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: orders-payments.ordersOrderGuidChecksCheckGuidPaymentsPaymentGuidPatch
      with:
        orderGuid: tools.orderGuid
        checkGuid: tools.checkGuid
        paymentGuid: tools.paymentGuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
