naftiko: 1.0.0-alpha2
info:
  label: Toast Labor API — Time entries
  description: 'Toast Labor API — Time entries. 2 operations. Lead operation: Toast Get Time Entries. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Toast Labor
  - Time entries
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: labor-time-entries
    baseUri: https://ws-api.toasttab.com/labor/v1
    description: Toast Labor API — Time entries business capability. Self-contained, no shared references.
    resources:
    - name: time-entries
      path: /timeEntries
      operations:
      - name: timeEntriesGet
        method: GET
        description: Toast Get Time Entries
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: timeEntryIds
          in: query
          type: array
          required: false
          description: "Optional array of one or more time entry identifiers, \neither the Toast platform GUID or an external identifier. \n100 max."
        - name: startDate
          in: query
          type: string
          required: false
          description: "Optional start date and time of time period to match time \nentries. A time entry matches the time period if its \nclock-in `inDate` is after (inclusive) the specified \n`startDate` and before (exclusive"
        - name: endDate
          in: query
          type: string
          required: false
          description: "Optional end date and time of time period to match time \nentries. A time entry matches the time period if its \nclock-in `inDate` is after (inclusive) the specified \n`startDate` and before (exclusive) "
        - name: modifiedStartDate
          in: query
          type: string
          required: false
          description: "Start date and time of the time period to match modified \ntime entries. A time entry matches the time period if that \nentry was modified after (inclusive) the \n`modifiedStartDate`. If you include this"
        - name: modifiedEndDate
          in: query
          type: string
          required: false
          description: "End date and time of the time period to match modified time \nentries. A time entry matches the time period if that entry \nwas modified before (exclusive) the `modifiedEndDate`. If \nyou include this pa"
        - name: businessDate
          in: query
          type: string
          required: false
          description: "Optional date to match time entries. A time entry matches \nthe business date if its clock-in `inDate` is during the \nbusiness date. The cutoff from one `businessDate` to the \nnext is the `closeoutHour"
        - name: includeMissedBreaks
          in: query
          type: boolean
          required: false
          description: "Optional flag to indicate whether missed breaks should be \nreturned in the breaks array for the time entries."
        - name: includeArchived
          in: query
          type: boolean
          required: false
          description: "Controls whether the response includes archived time entries, when\nusing the `startDate` and `endDate` parameters.\n\n**Important**: this parameter _has no effect_ if you use the\n`modifiedStartDate` and"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: time-entriestime-entry-id
      path: /timeEntries/{timeEntryId}
      operations:
      - name: timeEntriesTimeEntryIdGet
        method: GET
        description: Toast Get One Time Entry
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: timeEntryId
          in: path
          type: string
          required: true
          description: "The Toast platform GUID or an external identifier for the \ntime entry."
        - name: includeMissedBreaks
          in: query
          type: boolean
          required: false
          description: "Optional flag to indicate whether missed breaks should be \nreturned in the breaks array for the time entries."
        - name: includeArchived
          in: query
          type: boolean
          required: false
          description: "Controls whether the response includes an archived time entry.\nOptional."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: labor-time-entries-rest
    port: 8080
    description: REST adapter for Toast Labor API — Time entries. One resource per consumed operation.
    resources:
    - path: /v1/time-entries
      name: time-entries
      description: REST surface for timeEntriesGet.
      operations:
      - method: GET
        name: timeEntriesGet
        description: Toast Get Time Entries
        call: labor-time-entries.timeEntriesGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          timeEntryIds: rest.timeEntryIds
          startDate: rest.startDate
          endDate: rest.endDate
          modifiedStartDate: rest.modifiedStartDate
          modifiedEndDate: rest.modifiedEndDate
          businessDate: rest.businessDate
          includeMissedBreaks: rest.includeMissedBreaks
          includeArchived: rest.includeArchived
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/time-entriestime-entry-id
      name: time-entriestime-entry-id
      description: REST surface for timeEntriesTimeEntryIdGet.
      operations:
      - method: GET
        name: timeEntriesTimeEntryIdGet
        description: Toast Get One Time Entry
        call: labor-time-entries.timeEntriesTimeEntryIdGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          timeEntryId: rest.timeEntryId
          includeMissedBreaks: rest.includeMissedBreaks
          includeArchived: rest.includeArchived
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: labor-time-entries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toast Labor API — Time entries. One tool per consumed operation.
    tools:
    - name: get-time-entries
      description: Toast Get Time Entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: labor-time-entries.timeEntriesGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        timeEntryIds: tools.timeEntryIds
        startDate: tools.startDate
        endDate: tools.endDate
        modifiedStartDate: tools.modifiedStartDate
        modifiedEndDate: tools.modifiedEndDate
        businessDate: tools.businessDate
        includeMissedBreaks: tools.includeMissedBreaks
        includeArchived: tools.includeArchived
      outputParameters:
      - type: object
        mapping: $.
    - name: get-one-time-entry
      description: Toast Get One Time Entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: labor-time-entries.timeEntriesTimeEntryIdGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        timeEntryId: tools.timeEntryId
        includeMissedBreaks: tools.includeMissedBreaks
        includeArchived: tools.includeArchived
      outputParameters:
      - type: object
        mapping: $.
