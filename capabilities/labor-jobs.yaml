naftiko: 1.0.0-alpha2
info:
  label: Toast Labor API — Jobs
  description: 'Toast Labor API — Jobs. 4 operations. Lead operation: Toast Get Jobs. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Toast Labor
  - Jobs
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: labor-jobs
    baseUri: https://ws-api.toasttab.com/labor/v1
    description: Toast Labor API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: jobsGet
        method: GET
        description: Toast Get Jobs
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: jobIds
          in: query
          type: array
          required: false
          description: "An optional array of one or more job identifiers, either \nthe Toast platform GUID or an external identifier assigned \nby the client. 100 max. If not provided, all jobs known to \nthe Toast platform for"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobsjob-id
      path: /jobs/{jobId}
      operations:
      - name: jobsJobIdGet
        method: GET
        description: Toast Get One Job
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: jobId
          in: path
          type: string
          required: true
          description: "The Toast platform GUID or an external identifier for the \njob."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobsjob-idexternal-id
      path: /jobs/{jobId}/externalId
      operations:
      - name: jobsJobIdExternalIdPost
        method: POST
        description: Toast Add an External Identifier
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: Content-Type
          in: header
          type: string
          required: true
          description: "The Internet Assigned Numbers Authority (IANA) media type \nof the message body data. The value must be \n`application/json`."
        - name: body
          in: body
          type: object
          required: true
          description: "The JSON string value of the `externalId` for the job \nrecord. Wrap the value in double quotation marks to make it \nvalid JSON syntax."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobsjob-idexternal-id
      path: /jobs/{jobId}/externalId
      operations:
      - name: jobsJobIdExternalIdPut
        method: PUT
        description: Toast Add or Replace an External Identifier
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: "The Toast platform GUID of the restaurant that is the \ncontext for this operation."
        - name: Content-Type
          in: header
          type: string
          required: true
          description: "The Internet Assigned Numbers Authority (IANA) media type \nof the message body data. The value must be \n`application/json`."
        - name: body
          in: body
          type: object
          required: true
          description: "The JSON string value of the `externalId` for the job \nrecord. Wrap the value in double quotation marks to make it \nvalid JSON syntax."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: labor-jobs-rest
    port: 8080
    description: REST adapter for Toast Labor API — Jobs. One resource per consumed operation.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobsGet.
      operations:
      - method: GET
        name: jobsGet
        description: Toast Get Jobs
        call: labor-jobs.jobsGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          jobIds: rest.jobIds
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobsjob-id
      name: jobsjob-id
      description: REST surface for jobsJobIdGet.
      operations:
      - method: GET
        name: jobsJobIdGet
        description: Toast Get One Job
        call: labor-jobs.jobsJobIdGet
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobsjob-idexternal-id
      name: jobsjob-idexternal-id
      description: REST surface for jobsJobIdExternalIdPost.
      operations:
      - method: POST
        name: jobsJobIdExternalIdPost
        description: Toast Add an External Identifier
        call: labor-jobs.jobsJobIdExternalIdPost
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          Content-Type: rest.Content-Type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobsjob-idexternal-id
      name: jobsjob-idexternal-id
      description: REST surface for jobsJobIdExternalIdPut.
      operations:
      - method: PUT
        name: jobsJobIdExternalIdPut
        description: Toast Add or Replace an External Identifier
        call: labor-jobs.jobsJobIdExternalIdPut
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          Content-Type: rest.Content-Type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: labor-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toast Labor API — Jobs. One tool per consumed operation.
    tools:
    - name: get-jobs
      description: Toast Get Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: labor-jobs.jobsGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        jobIds: tools.jobIds
      outputParameters:
      - type: object
        mapping: $.
    - name: get-one-job
      description: Toast Get One Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: labor-jobs.jobsJobIdGet
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: add-external-identifier
      description: Toast Add an External Identifier
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: labor-jobs.jobsJobIdExternalIdPost
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        Content-Type: tools.Content-Type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: add-replace-external-identifier
      description: Toast Add or Replace an External Identifier
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: labor-jobs.jobsJobIdExternalIdPut
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        Content-Type: tools.Content-Type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
