naftiko: 1.0.0-alpha2
info:
  label: Stock API — Stock
  description: 'Stock API — Stock. 3 operations. Lead operation: Toast Get Menu Item Inventory for a Restaurant. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Stock
  - Stock
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: stock-stock
    baseUri: https://ws-api.toasttab.com/stock/v1
    description: Stock API — Stock business capability. Self-contained, no shared references.
    resources:
    - name: v1inventory
      path: /v1/inventory
      operations:
      - name: getInventory
        method: GET
        description: Toast Get Menu Item Inventory for a Restaurant
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The Toast GUID of the restaurant queried for inventory information.
        - name: status
          in: query
          type: string
          required: false
          description: "Limits the items in the response to those items with the specified\nstock status. Values are:\n\n* `OUT_OF_STOCK`- Returns all menu items that have the\n  `OUT_OF_STOCK` stock status.\n\n* `QUANTITY` - Retu"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1inventorysearch
      path: /v1/inventory/search
      operations:
      - name: postInventorySearch
        method: POST
        description: Toast Get Inventory Information for Specific Menu Items
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The Toast GUID of the restaurant queried for inventory information.
        - name: body
          in: body
          type: object
          required: true
          description: "An `InventorySearchRequest` object containing identifiers for the\nmenu items to include in the search."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1inventoryupdate
      path: /v1/inventory/update
      operations:
      - name: updateInventory
        method: PUT
        description: Toast Update Inventory Information for Specific Menu Items
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The Toast GUID of the restaurant whose inventory information will be updated.
        - name: body
          in: body
          type: object
          required: true
          description: "An array of `MenuItemInventory` objects for the menu items to be\nupdated, with the following values:\n\n* An identifier for the menu item to be updated. This may be either the\n  menu item's `multiLocati"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: stock-stock-rest
    port: 8080
    description: REST adapter for Stock API — Stock. One resource per consumed operation.
    resources:
    - path: /v1/v1inventory
      name: v1inventory
      description: REST surface for getInventory.
      operations:
      - method: GET
        name: getInventory
        description: Toast Get Menu Item Inventory for a Restaurant
        call: stock-stock.getInventory
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1inventorysearch
      name: v1inventorysearch
      description: REST surface for postInventorySearch.
      operations:
      - method: POST
        name: postInventorySearch
        description: Toast Get Inventory Information for Specific Menu Items
        call: stock-stock.postInventorySearch
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1inventoryupdate
      name: v1inventoryupdate
      description: REST surface for updateInventory.
      operations:
      - method: PUT
        name: updateInventory
        description: Toast Update Inventory Information for Specific Menu Items
        call: stock-stock.updateInventory
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stock-stock-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stock API — Stock. One tool per consumed operation.
    tools:
    - name: get-menu-item-inventory-restaurant
      description: Toast Get Menu Item Inventory for a Restaurant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stock-stock.getInventory
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-inventory-information-specific-menu
      description: Toast Get Inventory Information for Specific Menu Items
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: stock-stock.postInventorySearch
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-inventory-information-specific-menu
      description: Toast Update Inventory Information for Specific Menu Items
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: stock-stock.updateInventory
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
