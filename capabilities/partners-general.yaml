naftiko: 1.0.0-alpha2
info:
  label: Partners API — general
  description: 'Partners API — general. 2 operations. Lead operation: Toast Get Accessible Restaurants. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Partners
  - general
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: partners-general
    baseUri: https://ws-api.toasttab.com/partners/v1
    description: Partners API — general business capability. Self-contained, no shared references.
    resources:
    - name: restaurants
      path: /restaurants
      operations:
      - name: restaurantsGet
        method: GET
        description: Toast Get Accessible Restaurants
        inputParameters:
        - name: lastModified
          in: query
          type: string
          required: false
          description: "Limits the return data to restaurants that changed their \naccess configuration for a partner API client after a \nspecific date and time.\n\nRestaurants returned either:\n\n* Gave access to a partner API c"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: connected-restaurants
      path: /connectedRestaurants
      operations:
      - name: connectedRestaurantsGet
        method: GET
        description: Toast Get Connected Restaurants
        inputParameters:
        - name: lastModified
          in: query
          type: string
          required: false
          description: "Limits the return data to restaurants that changed their access\nconfiguration for your partner service after a specific date and\ntime. You can use this parameter to identify new or updated\nrestaurants"
        - name: pageSize
          in: query
          type: integer
          required: false
          description: "Controls the number of `PartnerAccessExternalRep` objects that the\nendpoint will return in each page of response data. The default page\nsize is `100`. The maximum page size is `200`."
        - name: pageToken
          in: query
          type: string
          required: false
          description: "Returns a specific set of restaurants in the response value. You get\nthe token string for the next page of connected restaurants from the\n`nextPageToken` value of the `PaginatedResponse` object for a "
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: partners-general-rest
    port: 8080
    description: REST adapter for Partners API — general. One resource per consumed operation.
    resources:
    - path: /v1/restaurants
      name: restaurants
      description: REST surface for restaurantsGet.
      operations:
      - method: GET
        name: restaurantsGet
        description: Toast Get Accessible Restaurants
        call: partners-general.restaurantsGet
        with:
          lastModified: rest.lastModified
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connected-restaurants
      name: connected-restaurants
      description: REST surface for connectedRestaurantsGet.
      operations:
      - method: GET
        name: connectedRestaurantsGet
        description: Toast Get Connected Restaurants
        call: partners-general.connectedRestaurantsGet
        with:
          lastModified: rest.lastModified
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: partners-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Partners API — general. One tool per consumed operation.
    tools:
    - name: get-accessible-restaurants
      description: Toast Get Accessible Restaurants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partners-general.restaurantsGet
      with:
        lastModified: tools.lastModified
      outputParameters:
      - type: object
        mapping: $.
    - name: get-connected-restaurants
      description: Toast Get Connected Restaurants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partners-general.connectedRestaurantsGet
      with:
        lastModified: tools.lastModified
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
