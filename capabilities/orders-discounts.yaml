naftiko: 1.0.0-alpha2
info:
  label: Toast Orders API — Discounts
  description: 'Toast Orders API — Discounts. 3 operations. Lead operation: Toast Add Check-level Discounts. Self-contained Naftiko capability covering one Toast business surface.'
  tags:
  - Toast
  - Toast Orders
  - Discounts
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    TOAST_API_TOKEN: TOAST_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: orders-discounts
    baseUri: https://ws-api.toasttab.com/orders/v2
    description: Toast Orders API — Discounts business capability. Self-contained, no shared references.
    resources:
    - name: ordersorder-guidcheckscheck-guidapplied-discounts
      path: /orders/{orderGuid}/checks/{checkGuid}/appliedDiscounts
      operations:
      - name: ordersChecksAppliedDiscountsPost
        method: POST
        description: Toast Add Check-level Discounts
        inputParameters:
        - name: orderGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the order that you are\nadding a discount to."
        - name: checkGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the check that you are\nadding a discount to."
        - name: body
          in: body
          type: object
          required: true
          description: A JSON array of `AppliedDiscount` objects that identify the discounts you are adding.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ordersorder-guidcheckscheck-guidselectionsselection-guidapplied-discounts
      path: /orders/{orderGuid}/checks/{checkGuid}/selections/{selectionGuid}/appliedDiscounts
      operations:
      - name: ordersChecksSelectionsAppliedDiscountsPost
        method: POST
        description: Toast Add Item-level Discounts
        inputParameters:
        - name: orderGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the order that you are\nadding a discount to."
        - name: checkGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the check that you are\nadding a discount to."
        - name: selectionGuid
          in: path
          type: string
          required: true
          description: "The Toast platform identifier of the menu item selection\nthat you are adding a discount to."
        - name: body
          in: body
          type: object
          required: true
          description: A JSON array of `AppliedDiscount` objects that identify the discounts you are adding.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applicable-discounts
      path: /applicableDiscounts
      operations:
      - name: applicableDiscountsPost
        method: POST
        description: Toast Get Applicable Discounts
        inputParameters:
        - name: Toast-Restaurant-External-ID
          in: header
          type: string
          required: true
          description: The identifier of the restaurant.
        - name: body
          in: body
          type: object
          required: true
          description: "A JSON `ApplicableDiscountsRequest` object containing\ninformation about an order, and an optional `promoCode`."
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOAST_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: orders-discounts-rest
    port: 8080
    description: REST adapter for Toast Orders API — Discounts. One resource per consumed operation.
    resources:
    - path: /v1/ordersorder-guidcheckscheck-guidapplied-discounts
      name: ordersorder-guidcheckscheck-guidapplied-discounts
      description: REST surface for ordersChecksAppliedDiscountsPost.
      operations:
      - method: POST
        name: ordersChecksAppliedDiscountsPost
        description: Toast Add Check-level Discounts
        call: orders-discounts.ordersChecksAppliedDiscountsPost
        with:
          orderGuid: rest.orderGuid
          checkGuid: rest.checkGuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ordersorder-guidcheckscheck-guidselectionsselection-guidapplied-discounts
      name: ordersorder-guidcheckscheck-guidselectionsselection-guidapplied-discounts
      description: REST surface for ordersChecksSelectionsAppliedDiscountsPost.
      operations:
      - method: POST
        name: ordersChecksSelectionsAppliedDiscountsPost
        description: Toast Add Item-level Discounts
        call: orders-discounts.ordersChecksSelectionsAppliedDiscountsPost
        with:
          orderGuid: rest.orderGuid
          checkGuid: rest.checkGuid
          selectionGuid: rest.selectionGuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applicable-discounts
      name: applicable-discounts
      description: REST surface for applicableDiscountsPost.
      operations:
      - method: POST
        name: applicableDiscountsPost
        description: Toast Get Applicable Discounts
        call: orders-discounts.applicableDiscountsPost
        with:
          Toast-Restaurant-External-ID: rest.Toast-Restaurant-External-ID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: orders-discounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toast Orders API — Discounts. One tool per consumed operation.
    tools:
    - name: add-checklevel-discounts
      description: Toast Add Check-level Discounts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: orders-discounts.ordersChecksAppliedDiscountsPost
      with:
        orderGuid: tools.orderGuid
        checkGuid: tools.checkGuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: add-itemlevel-discounts
      description: Toast Add Item-level Discounts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: orders-discounts.ordersChecksSelectionsAppliedDiscountsPost
      with:
        orderGuid: tools.orderGuid
        checkGuid: tools.checkGuid
        selectionGuid: tools.selectionGuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-applicable-discounts
      description: Toast Get Applicable Discounts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: orders-discounts.applicableDiscountsPost
      with:
        Toast-Restaurant-External-ID: tools.Toast-Restaurant-External-ID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
